services:
  # Web service for the Django application
  - type: web
    name: chipscan-ph
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn --timeout 120 chipscan_project.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chipscan-db
          property: connectionString
      - key: DJANGO_DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ALLOWED_HOSTS
        value: "*" # Or restrict to your Render app domain once created
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"

    # NOTE: To keep uploaded files (like scan history photos) across redeploys,
    # uncomment the disk block below. This requires a paid plan on Render.
    # disk:
    #   name: media-storage
    #   mountPath: /opt/render/project/src/media
    #   sizeGB: 10

databases:
  # PostgreSQL database instance
  - name: chipscan-db
    databaseName: chipscandb
    user: chipscan_user
    plan: free # Can be upgraded to 'starter' or higher for production use
